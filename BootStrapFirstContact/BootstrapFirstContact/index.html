<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootstrapFirstContact</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</head>

<body  class="d-flex justify-content-center align-items-center">
    <form class="bg-dark-subtle border-0 rounded-4 p-4 shadow-lg ">
        <h2>Salvar Objetos No LocalStorage</h2>
        <div class="mb-3">
            <label for="nome" class="form-label">Seu nome aqui</label>
            <input id="nome" type="text" class="form-control w-100"  placeholder="seu nome aqui">
        </div>

        <div class="mb-3">
            <label for="idade" class="form-label">Sua idade aqui</label>
            <input id="idade" type="number" class="form-control w-100" placeholder="sua idade aqui">
        </div>
        <button onclick="saveUser()"  type="submit" class="btn btn-primary w-100">Salvar usuário</button>
    </form>
    <div>
        <ul id="list">Recent users:</ul>
    </div>
    <script src="js/script.js"></script>

    <style>
        body{
            height: 100dvh;
        }
    </style>
</body>

</html>
